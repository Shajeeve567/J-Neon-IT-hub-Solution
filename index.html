    // Check if current path is NOT admin before loading GA
    if (!window.location.pathname.startsWith('/admin')) {
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=G-50ZJGFFK1F';
      document.head.appendChild(script);

      script.onload = () => {
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-50ZJGFFK1F');
      };
    }
  </script>
</head>
